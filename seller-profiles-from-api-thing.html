<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        :root{
            --bg:#f6f8fb;--card:#ffffff;--text:#0b1220;--muted:#4b5563
        }
        *{
            margin: 0;
            padding: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        html,body{
            height:100%;
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial
        }
        .wrap{
            max-width:800px;
            margin:48px auto;
            padding:28px;
            background:var(--card);
            border-radius:12px;
            box-shadow:0 6px 18px rgba(11,18,32,0.06)
        }
        h1{
            margin:0 0 8px;
            font-size:1.8rem
        }
        p{
            margin:0;
            color:var(--muted);
            line-height:1.5
        }
        main, header{
            display: flex;
            justify-content: space-between;
            margin: 5vh 10vw;
        }
        header{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .users-listbober{
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<nav><a href="https://vanvani41.github.io/api-thing.html">Home</a></nav>
<div class="wrap"></div>
<script>
    let url = 'https://my-json-server.typicode.com/vanvani41/a-repo';

    fetch(url + '/users')
        .then(async function(res){
            let users = await res.json()
            users.forEach(u => {
                let uElem = document.createElement("div.users-listbober");
                uElem.innerHTML = `
                <h2 class="user-name">${u.name}</h2> <h2 class="user-sirname"${u.sirname}></h2>
                <img class="user-photo" src="${u.photo_url}" alt="${u.name}">
                <p class="user-balance"><b>Balance:</b> ${u.balance}</p>
                `;
            })
        });
</script>
</body>
</html>
