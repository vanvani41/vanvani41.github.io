<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V41's Kanban</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            margin: 0 0 18px 0;
        }

        .topbar, .column-create-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 16px;
        }

        input, button, select {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        input, select {
            outline: none;
        }

        button {
            cursor: pointer;
            color: white;
            background: #2563eb;
            font-weight: bold;
        }

        button:hover {
            filter: brightness(1.08);
        }

        .save-btn {
            background: #16a34a;
        }

        .load-btn {
            background: #9333ea;
        }

        .delete-column-btn {
            background: #dc2626;
        }

        .status {
            text-align: center;
            opacity: 0.85;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .board {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .column {
            background: #1e293b;
            border-radius: 16px;
            padding: 14px;
            min-width: 320px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        .column-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .column-name-input {
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            background: #334155;
            color: white;
        }

        .column-name-input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        .task-add-box {
            display: flex;
            gap: 8px;
        }

        .task-add-box input {
            flex: 1;
        }

        .task-add-box button {
            white-space: nowrap;
        }

        .task-list {
            min-height: 220px;
            border-radius: 12px;
            padding: 6px;
            transition: background 0.2s;
        }

        .task-list.drag-over {
            background: rgba(37, 99, 235, 0.18);
        }

        .task {
            background: #334155;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: grab;
        }

        .task.dragging {
            opacity: 0.55;
        }

        .task-text {
            margin-bottom: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-buttons {
            display: flex;
            gap: 8px;
        }

        .task-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 13px;
        }

        .edit-btn {
            background: #f59e0b;
        }

        .delete-btn {
            background: #ef4444;
        }

        .empty-text {
            text-align: center;
            opacity: 0.65;
            padding-top: 18px;
        }

        .hidden-file-input {
            display: none;
        }
    </style>
</head>
<body>
<h1>V41's Kanban</h1>

<div class="column-create-bar">
    <input type="text" id="newColumnInput" placeholder="Колонка 1">
    <button onclick="createColumn()">Створити колонку</button>
</div>

<div class="topbar">
    <button class="save-btn" onclick="saveToV41File()">Зберегти .v41githubiokanban</button>
    <button class="load-btn" onclick="document.getElementById('fileInput').click()">Відкрити .v41githubiokanban</button>
    <input class="hidden-file-input" id="fileInput" type="file" accept=".v41githubiokanban,.txt,.cfg" onchange="loadFromFile(event)">
</div>

<div class="status" id="statusText">Готово.</div>

<div class="board" id="board"></div>

<script>
    let draggedTaskId = null;

    let boardData = {
        lastUpdated: new Date().toISOString(),
        columns: []
    };

    function createId(prefix = "id") {
        return prefix + "_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    }

    function updateStatus(text) {
        document.getElementById("statusText").textContent = text;
    }

    function touchUpdated() {
        boardData.lastUpdated = new Date().toISOString();
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.innerText = text;
        return div.innerHTML;
    }

    function getNextColumnNumber() {
        return boardData.columns.length + 1;
    }

    function updateNewColumnPlaceholder() {
        document.getElementById("newColumnInput").placeholder = "Колонка " + getNextColumnNumber();
    }

    function createColumn() {
        const input = document.getElementById("newColumnInput");
        let name = input.value.trim();

        if (name === "") {
            alert("Назву колонки не можна залишити пустим!");
            return;
        }

        boardData.columns.push({
            id: createId("column"),
            name: name,
            tasks: []
        });

        input.value = "";
        touchUpdated();
        renderBoard();
        updateStatus("Колонку створено.");
    }

    function deleteColumn(columnId) {
        boardData.columns = boardData.columns.filter(column => column.id !== columnId);
        touchUpdated();
        renderBoard();
        updateStatus("Колонку видалено.");
    }

    function handleColumnNameInput(columnId, value) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.name = value;
        touchUpdated();
        renderBoard(false);
    }

    function handleColumnNameBlur(columnId, inputElement) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        const trimmed = inputElement.value.trim();

        if (trimmed === "") {
            alert("Назву колонки не можна залишити пустим!");
            column.name = "Колонка";
        } else {
            column.name = trimmed;
        }

        touchUpdated();
        renderBoard();
    }

    function addTask(columnId) {
        const input = document.getElementById("taskInput_" + columnId);
        if (!input) return;

        const text = input.value.trim();
        if (text === "") return;

        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.tasks.push({
            id: createId("task"),
            text: text
        });

        input.value = "";
        touchUpdated();
        renderBoard();
        updateStatus("Задачу додано.");
    }

    function editTask(columnId, taskId) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        const task = column.tasks.find(t => t.id === taskId);
        if (!task) return;

        const newText = prompt("Редагувати задачу:", task.text);
        if (newText === null) return;

        const trimmed = newText.trim();
        if (trimmed === "") return;

        task.text = trimmed;
        touchUpdated();
        renderBoard();
        updateStatus("Задачу змінено.");
    }

    function deleteTask(columnId, taskId) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.tasks = column.tasks.filter(t => t.id !== taskId);
        touchUpdated();
        renderBoard();
        updateStatus("Задачу видалено.");
    }

    function moveTask(taskId, targetColumnId) {
        let movedTask = null;

        for (const column of boardData.columns) {
            const index = column.tasks.findIndex(task => task.id === taskId);
            if (index !== -1) {
                movedTask = column.tasks.splice(index, 1)[0];
                break;
            }
        }

        if (!movedTask) return;

        const targetColumn = boardData.columns.find(c => c.id === targetColumnId);
        if (!targetColumn) return;

        targetColumn.tasks.push(movedTask);
        touchUpdated();
        renderBoard();
        updateStatus("Задачу переміщено.");
    }

    function renderBoard(updateFull = true) {
        const board = document.getElementById("board");
        board.innerHTML = "";

        for (const column of boardData.columns) {
            const columnEl = document.createElement("div");
            columnEl.className = "column";

            const tasksHtml = column.tasks.map(task => `
                    <div class="task" draggable="true" data-task-id="${task.id}" data-column-id="${column.id}">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-buttons">
                            <button class="edit-btn" onclick="editTask('${column.id}', '${task.id}')">Edit</button>
                            <button class="delete-btn" onclick="deleteTask('${column.id}', '${task.id}')">Delete</button>
                        </div>
                    </div>
                `).join("");

            columnEl.innerHTML = `
                    <div class="column-top">
                        <input
                            type="text"
                            class="column-name-input"
                            value="${escapeHtml(column.name)}"
                            oninput="handleColumnNameInput('${column.id}', this.value)"
                            onblur="handleColumnNameBlur('${column.id}', this)"
                        >
                        <button class="delete-column-btn" onclick="deleteColumn('${column.id}')">Видалити колонку</button>
                        <div class="task-add-box">
                            <input type="text" id="taskInput_${column.id}" placeholder="Нова задача...">
                            <button onclick="addTask('${column.id}')">Додати</button>
                        </div>
                    </div>
                    <div class="task-list" data-column-id="${column.id}">
                        ${tasksHtml || '<div class="empty-text">Пусто</div>'}
                    </div>
                `;

            board.appendChild(columnEl);
        }

        setupDragAndDrop();
        setupTaskInputEnters();
        updateNewColumnPlaceholder();
    }

    function setupTaskInputEnters() {
        for (const column of boardData.columns) {
            const input = document.getElementById("taskInput_" + column.id);
            if (!input) continue;

            input.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    addTask(column.id);
                }
            });
        }
    }

    function setupDragAndDrop() {
        document.querySelectorAll(".task").forEach(taskEl => {
            taskEl.addEventListener("dragstart", () => {
                draggedTaskId = taskEl.dataset.taskId;
                taskEl.classList.add("dragging");
            });

            taskEl.addEventListener("dragend", () => {
                taskEl.classList.remove("dragging");
            });
        });

        document.querySelectorAll(".task-list").forEach(list => {
            list.addEventListener("dragover", event => {
                event.preventDefault();
                list.classList.add("drag-over");
            });

            list.addEventListener("dragleave", () => {
                list.classList.remove("drag-over");
            });

            list.addEventListener("drop", () => {
                list.classList.remove("drag-over");

                if (!draggedTaskId) return;
                moveTask(draggedTaskId, list.dataset.columnId);
            });
        });
    }

    function escapeFileValue(text) {
        return String(text)
            .replace(/\\/g, "\\\\")
            .replace(/\|/g, "\\p")
            .replace(/\{/g, "\\ob")
            .replace(/\}/g, "\\cb")
            .replace(/\[/g, "\\os")
            .replace(/\]/g, "\\cs")
            .replace(/\n/g, "\\n")
            .replace(/,/g, "\\c");
    }

    function unescapeFileValue(text) {
        return String(text)
            .replace(/\\n/g, "\n")
            .replace(/\\c/g, ",")
            .replace(/\\cs/g, "]")
            .replace(/\\os/g, "[")
            .replace(/\\cb/g, "}")
            .replace(/\\ob/g, "{")
            .replace(/\\p/g, "|")
            .replace(/\\\\/g, "\\");
    }

    function splitEscaped(text, separator) {
        const result = [];
        let current = "";
        let escaped = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];

            if (escaped) {
                current += "\\" + ch;
                escaped = false;
                continue;
            }

            if (ch === "\\") {
                escaped = true;
                continue;
            }

            if (ch === separator) {
                result.push(current);
                current = "";
                continue;
            }

            current += ch;
        }

        if (escaped) current += "\\";
        result.push(current);
        return result;
    }

    function serializeBoardData() {
        touchUpdated();

        const lines = [];
        lines.push(`[Last Updated: ${boardData.lastUpdated}]`);
        lines.push(`[Columns: {${boardData.columns.map(column => escapeFileValue(column.name)).join(", ")}}]`);

        for (let i = 0; i < boardData.columns.length; i++) {
            const column = boardData.columns[i];
            const tasks = column.tasks.map(task => escapeFileValue(task.text)).join("|");
            lines.push(`[Column ${i + 1}: {${tasks}}]`);
        }

        return lines.join("\n");
    }

    function parseBoardData(content) {
        const lines = content.split(/\r?\n/).map(line => line.trim()).filter(Boolean);

        const lastUpdatedLine = lines.find(line => line.startsWith("[Last Updated:"));
        const columnsLine = lines.find(line => line.startsWith("[Columns:"));

        if (!columnsLine) {
            throw new Error("У файлі немає секції Columns.");
        }

        const lastUpdatedMatch = lastUpdatedLine ? lastUpdatedLine.match(/\[Last Updated:\s*(.*?)\]/) : null;
        const columnsMatch = columnsLine.match(/\[Columns:\s*\{([\s\S]*?)\}\]/);

        if (!columnsMatch) {
            throw new Error("Неправильний формат Columns.");
        }

        const columnNamesRaw = splitEscaped(columnsMatch[1], ",").map(x => x.trim()).filter(x => x.length > 0);
        const columns = columnNamesRaw.map(name => ({
            id: createId("column"),
            name: unescapeFileValue(name),
            tasks: []
        }));

        for (let i = 0; i < columns.length; i++) {
            const line = lines.find(line => line.startsWith(`[Column ${i + 1}:`));
            if (!line) continue;

            const match = line.match(new RegExp(`\\[Column ${i + 1}:\\s*\\{([\\s\\S]*?)\\}\\]`));
            if (!match) continue;

            const rawTasks = match[1].trim();
            if (rawTasks === "") continue;

            const taskTexts = splitEscaped(rawTasks, "|").filter(x => x.length > 0);
            columns[i].tasks = taskTexts.map(taskText => ({
                id: createId("task"),
                text: unescapeFileValue(taskText)
            }));
        }

        boardData = {
            lastUpdated: lastUpdatedMatch ? lastUpdatedMatch[1] : new Date().toISOString(),
            columns: columns
        };
    }

    function saveToV41File() {
        const content = serializeBoardData();
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "board.v41githubiokanban";
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
        updateStatus("Файл .v41githubiokanban збережено.");
    }

    function loadFromFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                parseBoardData(String(e.target.result || ""));
                renderBoard();
                updateStatus("Файл успішно завантажено.");
            } catch (error) {
                updateStatus("Помилка завантаження: " + error.message);
                alert("Не вдалося прочитати файл: " + error.message);
            }
        };

        reader.readAsText(file, "utf-8");
        event.target.value = "";
    }

    document.getElementById("newColumnInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            createColumn();
        }
    });

    updateNewColumnPlaceholder();
    renderBoard();
</script>
</body>
</html>
