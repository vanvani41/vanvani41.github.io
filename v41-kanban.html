<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V41's Kanban</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            margin: 0 0 18px 0;
        }

        .topbar,
        .column-create-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }

        input,
        button {
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
        }

        input {
            outline: none;
        }

        button {
            cursor: pointer;
            color: white;
            background: #2563eb;
            font-weight: bold;
        }

        button:hover {
            filter: brightness(1.08);
        }

        .save-btn {
            background: #16a34a;
        }

        .load-btn {
            background: #9333ea;
        }

        .delete-column-btn {
            background: #dc2626;
        }

        .lang-switch {
            display: flex;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            padding: 4px;
            border-radius: 12px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 8px 10px;
            min-width: 44px;
            border-radius: 10px;
        }

        .lang-btn.active {
            background: #1d4ed8;
            border-color: #3b82f6;
        }

        .status {
            text-align: center;
            opacity: 0.85;
            margin-bottom: 18px;
            font-size: 14px;
            min-height: 18px;
        }

        .board {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            overflow-x: hidden;
            padding-bottom: 10px;
        }

        .column {
            background: #1e293b;
            border-radius: 16px;
            padding: 14px;
            min-width: 320px;
            width: 320px;
            max-width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            flex-shrink: 1;
        }

        .column-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .column-name-input {
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            background: #334155;
            color: white;
        }

        .column-name-input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        .task-add-box {
            display: flex;
            gap: 8px;
        }

        .task-add-box input {
            flex: 1;
        }

        .task-add-box button {
            white-space: nowrap;
        }

        .task-list {
            min-height: 220px;
            border-radius: 12px;
            padding: 6px;
            transition: background 0.2s;
        }

        .task-list.drag-over {
            background: rgba(37, 99, 235, 0.18);
        }

        .task {
            background: #334155;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: grab;
        }

        .task.dragging {
            opacity: 0.55;
        }

        .task-text {
            margin-bottom: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-buttons {
            display: flex;
            gap: 8px;
        }

        .task-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 13px;
        }

        .edit-btn {
            background: #f59e0b;
        }

        .delete-btn {
            background: #ef4444;
        }

        .empty-text {
            text-align: center;
            opacity: 0.65;
            padding-top: 18px;
        }

        .hidden-file-input {
            display: none;
        }
    </style>
</head>
<body>
<h1>V41's Kanban</h1>

<div class="column-create-bar">
    <input type="text" id="newColumnInput">
    <button id="createColumnBtn" onclick="createColumn()">Створити колонку</button>

    <div class="lang-switch" id="langSwitch">
        <button class="lang-btn" id="langEnBtn" onclick="changeLanguage('en')">EN (US)</button>
        <button class="lang-btn" id="langUkBtn" onclick="changeLanguage('uk')">UA</button>
    </div>
</div>

<div class="topbar">
    <button id="saveBtn" class="save-btn" onclick="saveToV41File()">Зберегти .v41kanban</button>
    <button id="loadBtn" class="load-btn" onclick="document.getElementById('fileInput').click()">Відкрити .v41kanban</button>
    <input class="hidden-file-input" id="fileInput" type="file" accept=".v41kanban,.txt,.cfg" onchange="loadFromFile(event)">
</div>

<div class="status" id="statusText"></div>

<div class="board" id="board"></div>

<script>
    const BOARD_VERSION = "0.7.2";
    let draggedTaskId = null;
    let currentLanguage = "enUS";

    const i18n = {
        ukUA: {
            createColumn: "Створити колонку",
            saveFile: "Зберегти .v41kanban",
            loadFile: "Відкрити .v41kanban",
            deleteColumn: "Видалити колонку",
            addTask: "Додати",
            newTask: "Нова задача...",
            empty: "Пусто",
            columnCreated: "Колонку створено.",
            columnDeleted: "Колонку видалено.",
            taskAdded: "Задачу додано.",
            taskEdited: "Задачу змінено.",
            taskDeleted: "Задачу видалено.",
            taskMoved: "Задачу переміщено.",
            fileSaved: "Файл .v41kanban збережено.",
            fileLoaded: "Файл успішно завантажено.",
            fileLoadError: "Помилка завантаження: ",
            fileReadError: "Не вдалося прочитати файл: ",
            editTaskPrompt: "Редагувати задачу:",
            columnBase: "Колонка",
            fileNoVersion: "У файлі немає секції Version.",
            fileNoColumns: "У файлі немає секції Columns.",
            fileBadColumns: "Неправильний формат Columns.",
            outdatedVersion: "Застаріла версія!",
            edit: "Edit",
            del: "Delete"
        },
        enUS: {
            createColumn: "Create Column",
            saveFile: "Save .v41kanban",
            loadFile: "Open .v41kanban",
            deleteColumn: "Delete Column",
            addTask: "Add",
            newTask: "New task...",
            empty: "Empty",
            columnCreated: "Column created.",
            columnDeleted: "Column deleted.",
            taskAdded: "Task added.",
            taskEdited: "Task edited.",
            taskDeleted: "Task deleted.",
            taskMoved: "Task moved.",
            fileSaved: "File .v41kanban saved.",
            fileLoaded: "File loaded successfully.",
            fileLoadError: "Load error: ",
            fileReadError: "Could not read file: ",
            editTaskPrompt: "Edit task:",
            columnBase: "Column",
            fileNoVersion: "The file does not contain a Version section.",
            fileNoColumns: "The file does not contain a Columns section.",
            fileBadColumns: "Invalid Columns format.",
            outdatedVersion: "Outdated version!",
            edit: "Edit",
            del: "Delete"
        }
    };

    let boardData = {
        lastUpdated: new Date().toISOString(),
        version: BOARD_VERSION,
        columns: []
    };

    function t(key) {
        return i18n[currentLanguage][key] || key;
    }

    function createId(prefix = "id") {
        return prefix + "_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    }

    function updateStatus(text) {
        document.getElementById("statusText").textContent = text || "";
    }

    function touchUpdated() {
        boardData.lastUpdated = new Date().toISOString();
        boardData.version = BOARD_VERSION;
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.innerText = text;
        return div.innerHTML;
    }

    function getDefaultColumnName(index) {
        return `${t("columnBase")} ${index}`;
    }

    function getNextColumnNumber() {
        return boardData.columns.length + 1;
    }

    function updateNewColumnPlaceholder() {
        document.getElementById("newColumnInput").placeholder = getDefaultColumnName(getNextColumnNumber());
    }

    function updateLanguageButtons() {
        document.getElementById("langEnBtn").classList.toggle("active", currentLanguage === "en");
        document.getElementById("langUkBtn").classList.toggle("active", currentLanguage === "uk");
    }

    function applyStaticTexts() {
        document.getElementById("createColumnBtn").textContent = t("createColumn");
        document.getElementById("saveBtn").textContent = t("saveFile");
        document.getElementById("loadBtn").textContent = t("loadFile");
        updateNewColumnPlaceholder();
        updateLanguageButtons();
    }

    function changeLanguage(lang) {
        currentLanguage = lang;
        applyStaticTexts();

        boardData.columns.forEach((column, index) => {
            if (column.isDefaultName) {
                column.name = getDefaultColumnName(index + 1);
            }
        });

        renderBoard();
    }

    function createColumn() {
        const input = document.getElementById("newColumnInput");
        const placeholderName = getDefaultColumnName(getNextColumnNumber());
        let name = input.value.trim();

        if (name === "") {
            name = placeholderName;
        }

        boardData.columns.push({
            id: createId("column"),
            name: name,
            tasks: [],
            isDefaultName: name === placeholderName
        });

        input.value = "";
        touchUpdated();
        renderBoard();
        updateStatus(t("columnCreated"));
    }

    function deleteColumn(columnId) {
        boardData.columns = boardData.columns.filter(column => column.id !== columnId);
        touchUpdated();
        reindexDefaultColumnNames();
        renderBoard();
        updateStatus(t("columnDeleted"));
    }

    function handleColumnNameInput(columnId, value) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.name = value;
        column.isDefaultName = false;
    }

    function handleColumnNameBlur(columnId, inputElement) {
        const columnIndex = boardData.columns.findIndex(c => c.id === columnId);
        if (columnIndex === -1) return;

        const column = boardData.columns[columnIndex];
        const trimmed = inputElement.value.trim();
        const fallbackName = getDefaultColumnName(columnIndex + 1);

        if (trimmed === "") {
            column.name = fallbackName;
            column.isDefaultName = true;
        } else {
            column.name = trimmed;
            column.isDefaultName = false;
        }

        inputElement.value = column.name;
        touchUpdated();
    }

    function reindexDefaultColumnNames() {
        boardData.columns.forEach((column, index) => {
            if (column.isDefaultName) {
                column.name = getDefaultColumnName(index + 1);
            }
        });
    }

    function addTask(columnId) {
        const input = document.getElementById("taskInput_" + columnId);
        if (!input) return;

        const text = input.value.trim();
        if (text === "") return;

        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.tasks.push({
            id: createId("task"),
            text: text
        });

        input.value = "";
        touchUpdated();
        renderBoard();
        updateStatus(t("taskAdded"));
    }

    function editTask(columnId, taskId) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        const task = column.tasks.find(t => t.id === taskId);
        if (!task) return;

        const newText = prompt(t("editTaskPrompt"), task.text);
        if (newText === null) return;

        const trimmed = newText.trim();
        if (trimmed === "") return;

        task.text = trimmed;
        touchUpdated();
        renderBoard();
        updateStatus(t("taskEdited"));
    }

    function deleteTask(columnId, taskId) {
        const column = boardData.columns.find(c => c.id === columnId);
        if (!column) return;

        column.tasks = column.tasks.filter(t => t.id !== taskId);
        touchUpdated();
        renderBoard();
        updateStatus(t("taskDeleted"));
    }

    function moveTask(taskId, targetColumnId) {
        let movedTask = null;

        for (const column of boardData.columns) {
            const index = column.tasks.findIndex(task => task.id === taskId);
            if (index !== -1) {
                movedTask = column.tasks.splice(index, 1)[0];
                break;
            }
        }

        if (!movedTask) return;

        const targetColumn = boardData.columns.find(c => c.id === targetColumnId);
        if (!targetColumn) return;

        targetColumn.tasks.push(movedTask);
        touchUpdated();
        renderBoard();
        updateStatus(t("taskMoved"));
    }

    function renderBoard() {
        const board = document.getElementById("board");
        board.innerHTML = "";

        for (const column of boardData.columns) {
            const columnEl = document.createElement("div");
            columnEl.className = "column";

            const tasksHtml = column.tasks.map(task => `
                    <div class="task" draggable="true" data-task-id="${task.id}" data-column-id="${column.id}">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-buttons">
                            <button class="edit-btn" onclick="editTask('${column.id}', '${task.id}')">${t("edit")}</button>
                            <button class="delete-btn" onclick="deleteTask('${column.id}', '${task.id}')">${t("del")}</button>
                        </div>
                    </div>
                `).join("");

            columnEl.innerHTML = `
                    <div class="column-top">
                        <input
                            type="text"
                            class="column-name-input"
                            value="${escapeHtml(column.name)}"
                            placeholder="${escapeHtml(column.name)}"
                            data-column-id="${column.id}"
                        >
                        <button class="delete-column-btn" onclick="deleteColumn('${column.id}')">${t("deleteColumn")}</button>
                        <div class="task-add-box">
                            <input type="text" id="taskInput_${column.id}" placeholder="${t("newTask")}">
                            <button onclick="addTask('${column.id}')">${t("addTask")}</button>
                        </div>
                    </div>
                    <div class="task-list" data-column-id="${column.id}">
                        ${tasksHtml || `<div class="empty-text">${t("empty")}</div>`}
                    </div>
                `;

            board.appendChild(columnEl);
        }

        setupColumnNameInputs();
        setupDragAndDrop();
        setupTaskInputEnters();
        updateNewColumnPlaceholder();
        updateLanguageButtons();
    }

    function setupColumnNameInputs() {
        document.querySelectorAll(".column-name-input").forEach(input => {
            const columnId = input.dataset.columnId;

            input.addEventListener("input", function() {
                handleColumnNameInput(columnId, this.value);
            });

            input.addEventListener("blur", function() {
                handleColumnNameBlur(columnId, this);
            });

            input.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    this.blur();
                }
            });
        });
    }

    function setupTaskInputEnters() {
        for (const column of boardData.columns) {
            const input = document.getElementById("taskInput_" + column.id);
            if (!input) continue;

            input.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    addTask(column.id);
                }
            });
        }
    }

    function setupDragAndDrop() {
        document.querySelectorAll(".task").forEach(taskEl => {
            taskEl.addEventListener("dragstart", () => {
                draggedTaskId = taskEl.dataset.taskId;
                taskEl.classList.add("dragging");
            });

            taskEl.addEventListener("dragend", () => {
                taskEl.classList.remove("dragging");
            });
        });

        document.querySelectorAll(".task-list").forEach(list => {
            list.addEventListener("dragover", event => {
                event.preventDefault();
                list.classList.add("drag-over");
            });

            list.addEventListener("dragleave", () => {
                list.classList.remove("drag-over");
            });

            list.addEventListener("drop", () => {
                list.classList.remove("drag-over");

                if (!draggedTaskId) return;
                moveTask(draggedTaskId, list.dataset.columnId);
            });
        });
    }

    function escapeFileValue(text) {
        return String(text)
            .replace(/\\/g, "\\\\")
            .replace(/\|/g, "\\p")
            .replace(/\{/g, "\\ob")
            .replace(/\}/g, "\\cb")
            .replace(/\[/g, "\\os")
            .replace(/\]/g, "\\cs")
            .replace(/\n/g, "\\n")
            .replace(/,/g, "\\c");
    }

    function unescapeFileValue(text) {
        return String(text)
            .replace(/\\n/g, "\n")
            .replace(/\\c/g, ",")
            .replace(/\\cs/g, "]")
            .replace(/\\os/g, "[")
            .replace(/\\cb/g, "}")
            .replace(/\\ob/g, "{")
            .replace(/\\p/g, "|")
            .replace(/\\\\/g, "\\");
    }

    function splitEscaped(text, separator) {
        const result = [];
        let current = "";
        let escaped = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];

            if (escaped) {
                current += "\\" + ch;
                escaped = false;
                continue;
            }

            if (ch === "\\") {
                escaped = true;
                continue;
            }

            if (ch === separator) {
                result.push(current);
                current = "";
                continue;
            }

            current += ch;
        }

        if (escaped) current += "\\";
        result.push(current);
        return result;
    }

    function serializeBoardData() {
        touchUpdated();

        const lines = [];
        lines.push(`[Version: ${BOARD_VERSION}]`);
        lines.push(`[Last Updated: ${boardData.lastUpdated}]`);
        lines.push(`[Language: ${currentLanguage}]`);
        lines.push(`[Columns: {${boardData.columns.map(column => escapeFileValue(column.name)).join(", ")}}]`);

        for (let i = 0; i < boardData.columns.length; i++) {
            const column = boardData.columns[i];
            const tasks = column.tasks.map(task => escapeFileValue(task.text)).join("|");
            lines.push(`[Column ${i + 1}: {${tasks}}]`);
        }

        return lines.join("\n");
    }

    function parseBoardData(content) {
        const lines = content.split(/\r?\n/).map(line => line.trim()).filter(Boolean);

        const versionLine = lines.find(line => line.startsWith("[Version:"));
        const lastUpdatedLine = lines.find(line => line.startsWith("[Last Updated:"));
        const languageLine = lines.find(line => line.startsWith("[Language:"));
        const columnsLine = lines.find(line => line.startsWith("[Columns:"));

        if (!versionLine || !columnsLine) {
            alert(t("outdatedVersion"));
            throw new Error(!versionLine ? t("fileNoVersion") : t("fileNoColumns"));
        }

        const versionMatch = versionLine.match(/\[Version:\s*(.*?)\]/);
        const lastUpdatedMatch = lastUpdatedLine ? lastUpdatedLine.match(/\[Last Updated:\s*(.*?)\]/) : null;
        const languageMatch = languageLine ? languageLine.match(/\[Language:\s*(.*?)\]/) : null;
        const columnsMatch = columnsLine.match(/\[Columns:\s*\{([\s\S]*?)\}\]/);

        if (!columnsMatch) {
            throw new Error(t("fileBadColumns"));
        }

        const loadedVersion = versionMatch ? versionMatch[1].trim() : "";
        const loadedLanguage = languageMatch ? languageMatch[1].trim() : "uk";

        if (loadedLanguage === "enUS" || loadedLanguage === "ukUA") {
            currentLanguage = loadedLanguage;
        }

        const columnNamesRaw = splitEscaped(columnsMatch[1], ",").map(x => x.trim()).filter(x => x.length > 0);
        const columns = columnNamesRaw.map((name, index) => {
            const realName = unescapeFileValue(name);
            const defaultName = getDefaultColumnName(index + 1);

            return {
                id: createId("column"),
                name: realName,
                tasks: [],
                isDefaultName: realName === defaultName
            };
        });

        for (let i = 0; i < columns.length; i++) {
            const line = lines.find(line => line.startsWith(`[Column ${i + 1}:`));
            if (!line) continue;

            const match = line.match(new RegExp(`\\[Column ${i + 1}:\\s*\\{([\\s\\S]*?)\\}\\]`));
            if (!match) continue;

            const rawTasks = match[1].trim();
            if (rawTasks === "") continue;

            const taskTexts = splitEscaped(rawTasks, "|").filter(x => x.length > 0);
            columns[i].tasks = taskTexts.map(taskText => ({
                id: createId("task"),
                text: unescapeFileValue(taskText)
            }));
        }

        boardData = {
            lastUpdated: lastUpdatedMatch ? lastUpdatedMatch[1] : new Date().toISOString(),
            version: loadedVersion || BOARD_VERSION,
            columns: columns
        };

        reindexDefaultColumnNames();
    }

    function saveToV41File() {
        const content = serializeBoardData();
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "V41sKanbanBoard.v41kanban";
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
        updateStatus(t("fileSaved"));
    }

    function loadFromFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                parseBoardData(String(e.target.result || ""));
                applyStaticTexts();
                renderBoard();
                updateStatus(t("fileLoaded"));
            } catch (error) {
                updateStatus(t("fileLoadError") + error.message);
                alert(t("fileReadError") + error.message);
            }
        };

        reader.readAsText(file, "utf-8");
        event.target.value = "";
    }

    document.getElementById("newColumnInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            createColumn();
        }
    });

    applyStaticTexts();
    renderBoard();
    updateStatus("");
</script>
</body>
</html>
